<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* animação suave */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .fade-up.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* efeito pulse elegante */
        .pulse {
            position: relative;
        }

        .pulse::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            background: inherit;
            opacity: 0.4;
            animation: pulseAnim 2s infinite;
        }

        @keyframes pulseAnim {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }

            70% {
                transform: scale(2);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="bg-gray-950 text-white p-10">

    <div class="max-w-5xl mx-auto">

        <h2 class="text-3xl font-bold text-center mb-16">
            Minha Jornada
        </h2>

        <div class="relative">

            <!-- linha -->
            <div
                class="absolute left-1/2 top-0 w-[2px] h-full bg-gradient-to-b from-blue-500 via-purple-500 to-pink-500 transform -translate-x-1/2">
            </div>

            <!-- ITEM -->
            <div class="fade-up mb-16 flex items-center justify-between">
                <div class="w-5/12"></div>

                <!-- ponto -->
                <div class="pulse z-10 w-5 h-5 bg-blue-500 rounded-full shadow-lg"></div>

                <!-- card -->
                <div class="w-5/12">
                    <div
                        class="bg-gray-900 border border-gray-800 p-5 rounded-xl shadow-lg hover:scale-105 hover:shadow-blue-500/20 transition duration-300">
                        <h3 class="text-lg font-bold text-blue-400">2000</h3>
                        <p class="text-gray-400">Início da jornada de aprendizado</p>
                    </div>
                </div>
            </div>

            <!-- ITEM invertido -->
            <div class="fade-up mb-16 flex flex-row-reverse items-center justify-between">
                <div class="w-5/12"></div>

                <div class="pulse z-10 w-5 h-5 bg-purple-500 rounded-full shadow-lg"></div>

                <div class="w-5/12">
                    <div
                        class="bg-gray-900 border border-gray-800 p-5 rounded-xl shadow-lg hover:scale-105 hover:shadow-purple-500/20 transition duration-300">
                        <h3 class="text-lg font-bold text-purple-400">2005</h3>
                        <p class="text-gray-400">Primeiro contato com tecnologia</p>
                    </div>
                </div>
            </div>

            <!-- ITEM -->
            <div class="fade-up mb-16 flex items-center justify-between">
                <div class="w-5/12"></div>

                <div class="pulse z-10 w-5 h-5 bg-pink-500 rounded-full shadow-lg"></div>

                <div class="w-5/12">
                    <div
                        class="bg-gray-900 border border-gray-800 p-5 rounded-xl shadow-lg hover:scale-105 hover:shadow-pink-500/20 transition duration-300">
                        <h3 class="text-lg font-bold text-pink-400">2010</h3>
                        <p class="text-gray-400">Evolução técnica</p>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        // animação ao aparecer na tela
        const items = document.querySelectorAll('.fade-up');

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                }
            });
        }, { threshold: 0.2 });

        items.forEach(item => observer.observe(item));
    </script>

</body>

</html>
